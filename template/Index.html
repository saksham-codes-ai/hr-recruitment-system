<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Recruitment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 60px 20px;
        }
        
        h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.5em;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .btn {
            background: white;
            color: #667eea;
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .info {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            margin: 40px auto;
            border-radius: 15px;
            max-width: 800px;
            text-align: center;
        }
        
        .info h2 {
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        .info p {
            margin-bottom: 15px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HR Recruitment System</h1>
            <p class="subtitle">AI-Powered Job Posting & Interview Management</p>
            
            <a href="/create-job" class="btn">Create Job Posting</a>
        </header>
        
        <div class="info">
            <h2>What This System Does</h2>
            <p>✨ Create job postings with AI-generated descriptions</p>
            <p>📧 Send interview invitations via email</p>
            <p>📊 Track candidates and applications</p>
            <p>🗓️ Generate interview schedules</p>
        </div>
    </div>
</body>
</html>
