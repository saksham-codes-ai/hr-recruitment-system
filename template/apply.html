<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:0}
    .box{max-width:700px;margin:40px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    input,textarea,button{width:100%;padding:12px;margin:8px 0 14px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
    button{background:#16a34a;color:#fff;border:none;cursor:pointer}
    a{color:#2563eb;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <h1>Apply for {{ job.title }}</h1>
    <p><strong>{{ job.company }}</strong> • {{ job.location }}</p>
    <form method="POST">
      <input name="name" placeholder="Your Name" required>
      <input name="email" type="email" placeholder="Your Email" required>
      <input name="phone" placeholder="Phone Number">
      <textarea name="resume_text" rows="8" placeholder="Paste resume text or short summary"></textarea>
      <button type="submit">Submit Application</button>
    </form>
    <a href="/">← Back</a>
  </div>
</body>
</html>
